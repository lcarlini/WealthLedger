<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="WealthLedger logo">
  <defs>
    <linearGradient id="wl-bg" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0EA5A4"/>
      <stop offset="1" stop-color="#047857"/>
    </linearGradient>
    <linearGradient id="wl-bar" x1="128" y1="384" x2="384" y2="128" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#D1FAE5"/>
    </linearGradient>
    <filter id="wl-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#022C22" flood-opacity="0.28"/>
    </filter>
  </defs>

  <rect x="24" y="24" width="464" height="464" rx="112" fill="url(#wl-bg)"/>
  <rect x="24" y="24" width="464" height="464" rx="112" fill="#FFFFFF" fill-opacity="0.04"/>

  <g filter="url(#wl-shadow)">
    <rect x="128" y="280" width="52" height="104" rx="16" fill="url(#wl-bar)" fill-opacity="0.92"/>
    <rect x="230" y="224" width="52" height="160" rx="16" fill="url(#wl-bar)" fill-opacity="0.96"/>
    <rect x="332" y="168" width="52" height="216" rx="16" fill="url(#wl-bar)"/>
  </g>

  <path d="M150 250 L256 196 L360 128" stroke="#FBBF24" stroke-width="18" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <circle cx="360" cy="128" r="20" fill="#FBBF24"/>
  <circle cx="360" cy="128" r="9" fill="#FFFFFF"/>

  <rect x="128" y="404" width="256" height="16" rx="8" fill="#FFFFFF" fill-opacity="0.55"/>
</svg>
